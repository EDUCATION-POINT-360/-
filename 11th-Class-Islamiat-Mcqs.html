        let index = 0, correct = 0, wrong = 0;

        function startQuiz() { render(); }

        function render() {
            if(index >= mcqs.length) {
                document.getElementById('quiz-container').innerHTML = `
                    <h2 class="text-4xl font-bold mb-4">ٹیسٹ مکمل ہوا!</h2>
                    <p class="text-xl">آپ کا حتمی اسکور: ${mcqs.length > 0 ? Math.round((correct/mcqs.length)*100) : 0}%</p>
                    <button onclick="location.reload()" class="mt-8 px-8 py-3 bg-white text-black rounded-full font-bold">دوبارہ شروع کریں</button>
                `;
                return;
            }

            const q = mcqs[index];
            let optionsHTML = '';
            for (const [key, value] of Object.entries(q.options)) {
                optionsHTML += `<button onclick="check('${key}')" id="btn-${key}" class="option-btn p-5 rounded-2xl mb-2">
                                    <span class="font-bold opacity-50 ml-4">${key})</span> ${value}
                                </button>`;
            }

            document.getElementById('quiz-container').innerHTML = `
                <p class="text-blue-500 text-sm mb-4 font-bold">سوال ${index + 1} / ${mcqs.length}</p>
                <h2 class="text-2xl md:text-3xl font-medium mb-8 leading-relaxed">${q.question}</h2>
                <div class="grid gap-2">${optionsHTML}</div>
            `;
            updateDash();
        }

        function check(choice) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.style.pointerEvents = 'none');
            
            const q = mcqs[index];
            if(choice === q.answer) {
                correct++;
                document.getElementById(`btn-${choice}`).classList.add('correct');
            } else {
                wrong++;
                document.getElementById(`btn-${choice}`).classList.add('wrong');
                document.getElementById(`btn-${q.answer}`).classList.add('correct');
            }
            
            setTimeout(() => { index++; render(); }, 1000);
        }

        function updateDash() {
            document.getElementById('stat-correct').innerText = correct;
            document.getElementById('stat-wrong').innerText = wrong;
            document.getElementById('stat-score').innerText = Math.round((correct/(index+1 || 1))*100) + "%";
            document.getElementById('stat-left').innerText = mcqs.length - index;
            document.getElementById('progress-text').innerText = Math.round((index/mcqs.length)*100) + "% مکمل";
        }
    </script>
