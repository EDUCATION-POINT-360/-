    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Modern Glassmorphism Utilities */
        .glass-panel {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.5);
        }

        /* Apple Stripe Accent Track Animation */
        .apple-stripe {
            position: relative;
            overflow: hidden;
        }
        .apple-stripe::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899, #f43f5e, #eab308);
            background-size: 200% 100%;
            animation: stripeShift 8s linear infinite;
        }

        @keyframes stripeShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Standard custom scrollbar configuration */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Perfect Micro-animations */
        .grid-item-pop {
            transition: all 0.2s ease;
        }
        .grid-item-pop:active {
            transform: scale(0.92);
        }
        
        .animated-status-bar {
            transition: width 0.6s cubic-bezier(0.1, 1, 0.1, 1);
        }
    </style>
</head>

        // Architecture State Registry 
        let currentIndex = 0;
        let userResponses = JSON.parse(localStorage.getItem('ep_quiz_responses')) || {};
        let activeFilter = 'all';

        // Initial setup on layout generation 
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            initializeNavigationMatrix();
            renderEngineState();
        });

        // Generate the sidebar navigation items dynamic map
        function initializeNavigationMatrix() {
            const container = document.getElementById("navigation-matrix-grid");
            container.innerHTML = "";

            dataset.forEach((item, index) => {
                const element = document.createElement("button");
                element.id = `matrix-item-${index}`;
                element.className = `grid-item-pop text-xs font-semibold p-2.5 rounded-lg border text-center transition-all duration-200`;
                element.innerText = index + 1;
                element.onclick = () => selectActiveIndex(index);
                container.appendChild(element);
            });
            updateNavigationMatrixStyles();
        }

        // Apply background/border styles dynamically based on selection state
        function updateNavigationMatrixStyles() {
            dataset.forEach((item, index) => {
                const element = document.getElementById(`matrix-item-${index}`);
                if (!element) return;

                const status = userResponses[index];
                
                // Base state variables
                let bgStyle = "bg-slate-800/40 border-slate-700/60 text-slate-400";
                
                if (status) {
                    if (status.isCorrect) {
                        bgStyle = "bg-emerald-500/10 border-emerald-500/40 text-emerald-400 font-bold";
                    } else {
                        bgStyle = "bg-rose-500/10 border-rose-500/40 text-rose-400 font-bold";
                    }
                }

                // Append selection rings if matches active index context
                if (index === currentIndex) {
                    element.className = `grid-item-pop text-xs font-semibold p-2.5 rounded-lg border text-center transition-all duration-200 ring-2 ring-indigo-500 bg-indigo-500/20 border-indigo-400 text-white scale-105 shadow-lg shadow-indigo-500/10`;
                } else {
                    element.className = `grid-item-pop text-xs font-semibold p-2.5 rounded-lg border text-center transition-all duration-200 ${bgStyle}`;
                }

                // Handle filters visibility state toggles
                let isVisible = true;
                if (activeFilter === 'correct' && (!status || !status.isCorrect)) isVisible = false;
                if (activeFilter === 'wrong' && (!status || status.isCorrect)) isVisible = false;
                if (activeFilter === 'unattempted' && status) isVisible = false;

                element.style.display = isVisible ? "block" : "none";
            });

            // Calculate active visible configuration variables
            const attemptedCount = Object.keys(userResponses).length;
            document.getElementById("matrix-counter").innerText = `${attemptedCount} / ${dataset.length}`;
        }

        // Core component screen rendering engine
        function renderEngineState() {
            const currentItem = dataset[currentIndex];
            
            // Set basic typography headers
            document.getElementById("quiz-question-tag").innerText = `Question ${currentIndex + 1} of ${dataset.length}`;
            document.getElementById("quiz-question-text").innerText = currentItem.question;

            // Generate answer item option row components
            const optionsContainer = document.getElementById("quiz-options-container");
            optionsContainer.innerHTML = "";

            const historicSubmission = userResponses[currentIndex];

            currentItem.options.forEach((option) => {
                const optionButton = document.createElement("button");
                optionButton.className = `w-full text-left p-4 rounded-xl border font-medium text-sm transition-all duration-200 flex items-center justify-between glass-card group`;
                
                // Label component tracking
                const labelSpan = document.createElement("span");
                labelSpan.innerText = option;
                optionButton.appendChild(labelSpan);

                // Evaluation indicator icon matching schema
                const statusIconContainer = document.createElement("div");
                statusIconContainer.className = "w-5 h-5 rounded-full border border-slate-600 flex items-center justify-center transition-all";
                optionButton.appendChild(statusIconContainer);

                // Check condition parameters if item contains historical interaction records
                if (historicSubmission) {
                    optionButton.disabled = true;
                    if (option === currentItem.answer) {
                        // Mark valid absolute targets green
                        optionButton.className = `w-full text-left p-4 rounded-xl border font-medium text-sm transition-all duration-200 flex items-center justify-between bg-emerald-500/10 border-emerald-500/50 text-emerald-400`;
                        statusIconContainer.className = "w-5 h-5 rounded-full bg-emerald-500 border-transparent flex items-center justify-center text-slate-900";
                        statusIconContainer.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5 stroke-[3]"></i>`;
                    } else if (option === historicSubmission.selectedOption) {
                        // Mark current dynamic incorrect selection targeted by user red
                        optionButton.className = `w-full text-left p-4 rounded-xl border font-medium text-sm transition-all duration-200 flex items-center justify-between bg-rose-500/10 border-rose-500/50 text-rose-400`;
                        statusIconContainer.className = "w-5 h-5 rounded-full bg-rose-500 border-transparent flex items-center justify-center text-white";
                        statusIconContainer.innerHTML = `<i data-lucide="x" class="w-3.5 h-3.5 stroke-[3]"></i>`;
                    } else {
                        optionButton.className = `w-full text-left p-4 rounded-xl border font-medium text-sm flex items-center justify-between border-slate-800 bg-slate-900/20 text-slate-500 opacity-60`;
                    }
                } else {
                    // Active functional monitoring bindings
                    optionButton.onclick = () => evaluationEngineTrigger(option);
                    optionButton.className = `w-full text-left p-4 rounded-xl border font-medium text-sm transition-all duration-200 flex items-center justify-between bg-slate-800/30 border-slate-700/50 text-slate-300 hover:border-indigo-500/50 hover:bg-indigo-500/5 hover:text-white`;
                }

                optionsContainer.appendChild(optionButton);
            });

            // Adjust navigation panel layout controls status metrics
            document.getElementById("btn-prev").disabled = (currentIndex === 0);
            document.getElementById("btn-prev").style.opacity = (currentIndex === 0) ? "0.4" : "1";
            
            // Re-render vector icons matching structural requirements
            lucide.createIcons();
            calculateAnalyticsData();
            updateNavigationMatrixStyles();
        }

        // Action processor tracking user choice triggers
        function evaluationEngineTrigger(selectedOption) {
            if (userResponses[currentIndex]) return; // Block duplication vectors

            const currentItem = dataset[currentIndex];
            const isCorrect = (selectedOption === currentItem.answer);

            userResponses[currentIndex] = {
                selectedOption: selectedOption,
                isCorrect: isCorrect
            };

            localStorage.setItem('ep_quiz_responses', JSON.stringify(userResponses));
            renderEngineState();
        }

        // Control relative tracking indices pagination sequence functions
        function navigateQuestion(direction) {
            const nextIndex = currentIndex + direction;
            if (nextIndex >= 0 && nextIndex < dataset.length) {
                currentIndex = nextIndex;
                renderEngineState();
            }
        }

        // Jumps direct matrix targets instantly via navigation sidebar indexes
        function selectActiveIndex(targetIndex) {
            if (targetIndex >= 0 && targetIndex < dataset.length) {
                currentIndex = targetIndex;
                renderEngineState();
            }
        }

        // Dynamic analytical processing calculations engine 
        function calculateAnalyticsData() {
            const totalMCQs = dataset.length;
            let correctCount = 0;
            let wrongCount = 0;

            Object.values(userResponses).forEach(response => {
                if (response.isCorrect) correctCount++;
                else wrongCount++;
            });

            const attemptedCount = correctCount + wrongCount;
            const remainingCount = totalMCQs - attemptedCount;
            
            // Formula metrics calculations
            const percentageValue = totalMCQs > 0 ? Math.round((correctCount / totalMCQs) * 100) : 0;
            const accuracyValue = attemptedCount > 0 ? Math.round((correctCount / attemptedCount) * 100) : 0;

            // Render updates into standard view containers
            document.getElementById("stat-total").innerText = totalMCQs;
            document.getElementById("stat-remaining").innerText = remainingCount;
            document.getElementById("stat-correct").innerText = correctCount;
            document.getElementById("stat-wrong").innerText = wrongCount;
            document.getElementById("stat-accuracy").innerText = `${accuracyValue}%`;
            document.getElementById("stat-percentage").innerText = `${percentageValue}%`;

            // Adjust real-time horizontal process navigation elements wide bars
            const progressWeight = (attemptedCount / totalMCQs) * 100;
            document.getElementById("session-progress-bar").style.width = `${progressWeight}%`;
        }

        // Matrix navigation filters visibility modifiers controller action links
        function filterMatrix(targetFilter) {
            activeFilter = targetFilter;
            
            // Reset active style tags on active tab lists elements configurations
            ['all', 'correct', 'wrong', 'unattempted'].forEach(f => {
                const element = document.getElementById(`filter-${f}`);
                if(f === targetFilter) {
                    element.classList.add("border-indigo-500/50", "bg-indigo-500/10");
                } else {
                    element.classList.remove("border-indigo-500/50", "bg-indigo-500/10");
                }
            });

            updateNavigationMatrixStyles();
        }

        // Absolute memory wipe clear configuration commands reset options routing
        function resetDataStorage() {
            if (confirm("Are you sure you want to reset all quiz progress metrics? This action cannot be undone.")) {
                localStorage.removeItem('ep_quiz_responses');
                userResponses = {};
                currentIndex = 0;
                activeFilter = 'all';
                initializeNavigationMatrix();
                renderEngineState();
            }
        }
    </script>
