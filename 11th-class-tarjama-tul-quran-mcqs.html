        // Core App Variables State
        let currentIndex = 0;
        const totalMcqs = quizData.length;
        let userAnswers = new Array(totalMcqs).fill(null); // stores { selectedOption, isCorrect }

        // Initialize Application
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            buildNavigationGrid();
            renderQuestion();
            updateDashboardStats();
        });

        // Construct Grid Index Sidebar
        function buildNavigationGrid() {
            const container = document.getElementById('nav-grid-container');
            container.innerHTML = '';
            
            for(let i = 0; i < totalMcqs; i++) {
                const btn = document.createElement('button');
                btn.id = `nav-item-${i}`;
                btn.innerText = i + 1;
                btn.className = `p-2 text-xs font-semibold rounded-lg text-center border transition-all duration-200 ${getNavBtnClass(i)}`;
                btn.onclick = () => jumpToQuestion(i);
                container.appendChild(btn);
            }
        }

        function getNavBtnClass(index) {
            if (userAnswers[index] === null) {
                return index === currentIndex 
                    ? 'bg-gray-900 text-white border-gray-900 shadow-sm shadow-gray-200Scale' 
                    : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50';
            }
            return userAnswers[index].isCorrect 
                ? 'bg-emerald-50 text-emerald-700 border-emerald-200 font-bold' 
                : 'bg-rose-50 text-rose-700 border-rose-200 font-bold';
        }

        // Render Current State
        function renderQuestion() {
            const current = quizData[currentIndex];
            
            // Text values updates
            document.getElementById('current-question-num').innerText = current.number;
            document.getElementById('question-text').innerText = current.statement;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // Generate Apple Stripe Options Elements
            Object.entries(current.options).forEach(([key, value]) => {
                const button = document.createElement('button');
                button.className = `w-full p-4 rounded-2xl border text-right transition-all duration-200 flex items-center justify-between group relative overflow-hidden ${getOptionStyle(key)}`;
                button.onclick = () => handleAnswerSelect(key);
                // Disable if already answered
                if(userAnswers[currentIndex] !== null) button.disabled = true;

                button.innerHTML = `
                    <div class="flex items-center gap-3 w-full justify-between">
                         <span class="urdu-text text-base font-medium text-gray-700 group-hover:text-gray-900">${value}</span>
                         <span class="w-7 h-7 rounded-lg bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-500 uppercase shrink-0 transition-colors option-badge">${key}</span>
                    </div>
                `;
                optionsContainer.appendChild(button);
            });

            // Adjust navigation action status buttons
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').innerText = currentIndex === totalMcqs - 1 ? 'ٹیسٹ ختم کریں' : 'اگلا سوال';
            
            // Sync current highlight index tracking navigation item
            buildNavigationGrid();
            // Scroll nav item into view smoothly
            document.getElementById(`nav-item-${currentIndex}`).scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function getOptionStyle(optionKey) {
            const state = userAnswers[currentIndex];
            if (!state) {
                return 'bg-white border-gray-100 hover:border-gray-300 hover:bg-gray-50/50 shadow-sm';
            }
            const currentQuestion = quizData[currentIndex];
            // If correct key matching
            if (optionKey === currentQuestion.correct_option) {
                return 'bg-emerald-50 border-emerald-300 ring-2 ring-emerald-600/10 text-emerald-900';
            }
            // User picked wrong selection
            if (state.selectedOption === optionKey && !state.isCorrect) {
                return 'bg-rose-50 border-rose-300 ring-2 ring-rose-600/10 text-rose-900';
            }
            return 'bg-white border-gray-100 opacity-60';
        }

        // Logic processing answer actions
        function handleAnswerSelect(selectedOptionKey) {
            if (userAnswers[currentIndex] !== null) return; // Prevent duplication click processing
            
            const currentQuestion = quizData[currentIndex];
            const isCorrect = selectedOptionKey === currentQuestion.correct_option;
            
            userAnswers[currentIndex] = {
                selectedOption: selectedOptionKey,
                isCorrect: isCorrect
            };

            // Force refresh UI view mapping updates instantly
            renderQuestion();
            updateDashboardStats();
        }

        // Aggregate statistics computations metrics updates
        function updateDashboardStats() {
            let solved = 0;
            let correct = 0;
            let wrong = 0;

            userAnswers.forEach(ans => {
                if(ans !== null) {
                    solved++;
                    if(ans.isCorrect) correct++;
                    else wrong++;
                }
            });

            const left = totalMcqs - solved;
            const percentage = solved > 0 ? Math.round((correct / solved) * 100) : 0;

            // Interface text insertions text content injections
            document.getElementById('stat-solved').innerText = solved;
            document.getElementById('stat-left').innerText = left;
            document.getElementById('stat-correct').innerText = correct;
            document.getElementById('stat-wrong').innerText = wrong;
            document.getElementById('stat-percent').innerText = `${percentage}%`;

            // Circular progress calculations mapping logic animations SVG
            const circle = document.getElementById('percentage-ring');
            const radius = circle.r.baseVal.value;
            const circumference = 2 * Math.PI * radius; // 213.63
            
            circle.style.strokeDasharray = `${circumference}`;
            const offset = circumference - (percentage / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        // Controller functions
        function nextQuestion() {
            if(currentIndex < totalMcqs - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                alert('آپ کا ٹیسٹ مکمل ہو چکا ہے! اپنے مجموعی نمبر ڈیش بورڈ پر ملاحظہ کریں۔');
            }
        }

        function prevQuestion() {
            if(currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function jumpToQuestion(index) {
            currentIndex = index;
            renderQuestion();
        }

        function resetQuiz() {
            if(confirm('کیا آپ واقعی یہ ٹیسٹ دوبارہ شروع کرنا چاہتے ہیں؟ آپ کا سارا ریکارڈ حذف ہو جائے گا۔')) {
                currentIndex = 0;
                userAnswers = new Array(totalMcqs).fill(null);
                renderQuestion();
                updateDashboardStats();
            }
        }
    </script>
</body>
</html>
