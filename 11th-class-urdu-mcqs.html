            { chapter: "قواعد اردو - 11ویں جماعت", question: "الفاظ کا حقیقی کے بجائے مجازی معنی میں استعمال کہلاتا ہے:", options: ["تشبیہ", "استعارہ", "مقطع", "مطلع"], correct: "استعارہ", isAltFormat: true },
            { chapter: "قواعد اردو - 11ویں جماعت", question: "استعارہ کی نشان دہی کیجیے:", options: ["موتوں جیسے دانت", "صبر ایوب", "تاج سردارا", "کس شیر کی آمد"], correct: "کس شیر کی آمد", isAltFormat: true },
            { chapter: "قواعد اردو - 11ویں جماعت", question: "\"بچہ چاند کی طرح خوبصورت ہے\" میں مشبہ ہے:", options: ["محبوب", "خوبصورت", "بچہ", "چاند"], correct: "بچہ", isAltFormat: true },
            { chapter: "قواعد اردو - 11ویں جماعت", question: "مقطع کی شرط ہے:", options: ["ردیف کا موجود ہونا", "قافیے کا موجود ہونا", "تخلص کا ہونا", "ردیف کا نہ ہونا"], correct: "تخلص کا ہونا", isAltFormat: true },
            { chapter: "قواعد اردو - 11ویں جماعت", question: "\"کس چاند سے آنکھ ماری ہے\" میں مستعار منہ ہے:", options: ["محبوب", "خوبصورتی", "آنکھ", "چاند"], correct: "چاند", isAltFormat: true },

            { chapter: "شعری اصطلاحات", question: "طلوع ہونے کا مقام لغوی معنی ہے:", options: ["مطلع", "مقطع", "قافیہ", "ردیف"], correct: "مطلع", isAltFormat: true },
            { chapter: "شعری اصطلاحات", question: "قافیہ کے الفاظ ہوتے ہیں:", options: ["ہم وزن", "مختلف وزن", "ہم معنی", "بے معنی"], correct: "ہم وزن", isAltFormat: true },

            { chapter: "شعری اصطلاحات", question: "مصرعے میں ردیف کس جگہ آتی ہے؟", options: ["شروع میں", "درمیان میں", "آخر میں", "ہر جگہ"], correct: "آخر میں", isAltFormat: true },
            { chapter: "شعری اصطلاحات", question: "ہم، دم، نم، جم کیا ہیں:", options: ["قافیہ", "ردیف", "مقطع", "مطلع"], correct: "قافیہ", isAltFormat: true },
            { chapter: "شعری اصطلاحات", question: "غزل اور قصیدہ میں:", options: ["ردیف کا استعمال ضروری ہے", "ردیف کا استعمال ضروری نہیں ہے", "ردیف کے تین الفاظ ہوتے ہیں", "ردیف کے الفاظ کی تعداد متعین نہیں ہوتی"], correct: "ردیف کا استعمال ضروری نہیں ہے", isAltFormat: true },
            { chapter: "شعری اصطلاحات", question: "مطلع کے لیے ضروری ہے کہ وہ۔۔۔۔۔۔ کا پہلا شعر ہو:", options: ["مرثیہ", "مسدس", "غزل", "مخمس"], correct: "غزل", isAltFormat: true }
        ];

        let correctCount = 0;
        let wrongCount = 0;
        const totalMcqs = mcqsData.length;
        const answeredQuestions = new Set();

        function initDashboard() {
            document.getElementById('total-mcqs').innerText = totalMcqs;
            document.getElementById('left-mcqs').innerText = totalMcqs;
        }

        function updateDashboard() {
            const leftCount = totalMcqs - answeredQuestions.size;
            document.getElementById('left-mcqs').innerText = leftCount;
            document.getElementById('correct-answers').innerText = correctCount;
            document.getElementById('wrong-answers').innerText = wrongCount;
            
            const totalAnswered = correctCount + wrongCount;
            const percentage = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;
            document.getElementById('percentage').innerText = percentage + '%';
        }

        function loadQuiz() {
            const container = document.getElementById('quiz-container');
            
            mcqsData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'glass-panel rounded-2xl p-6 shadow-xs border border-gray-200/60 transition-all';
                card.id = `q-card-${index}`;

                const headerInfo = document.createElement('div');
                headerInfo.className = 'flex justify-between items-center mb-3 text-xs font-semibold text-gray-400';
                headerInfo.innerHTML = `<span>${item.chapter}</span><span>سوال نمبر ${index + 1}</span>`;
                card.appendChild(headerInfo);

                const qText = document.createElement('h3');
                qText.className = 'text-lg font-bold text-gray-900 mb-4 urdu-text';
                qText.innerText = item.question;
                card.appendChild(qText);

                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'grid grid-cols-1 md:grid-cols-2 gap-3 text-right';

                if (item.isAltFormat) {
                    item.options.forEach((opt) => {
                        const btn = createOptionButton(opt, opt, item.correct, index);
                        optionsGrid.appendChild(btn);
                    });
                } else {
                    Object.entries(item.options).forEach(([key, value]) => {
                        const btn = createOptionButton(key, `${key}) ${value}`, item.correct, index);
                        optionsGrid.appendChild(btn);
                    });
                }

                card.appendChild(optionsGrid);
                container.appendChild(card);
            });
        }

        function createOptionButton(keyValue, displayValue, correctValue, qIndex) {
            const btn = document.createElement('button');
            btn.className = 'w-full text-right p-3 px-4 rounded-xl border border-gray-200 bg-white hover:bg-gray-50/80 font-medium transition-all cursor-pointer text-sm md:text-base urdu-text';
            btn.innerText = displayValue;
            
            btn.onclick = function() {
                if (answeredQuestions.has(qIndex)) return;
                
                answeredQuestions.add(qIndex);
                const allButtons = document.getElementById(`q-card-${qIndex}`).querySelectorAll('button');
                
                if (keyValue === correctValue) {
                    btn.classList.remove('border-gray-200', 'bg-white', 'hover:bg-gray-50/80');
                    btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                    correctCount++;
                } else {
                    btn.classList.remove('border-gray-200', 'bg-white', 'hover:bg-gray-50/80');
                    btn.classList.add('bg-red-500', 'text-white', 'border-red-600');
                    wrongCount++;

                    allButtons.forEach(b => {
                        if (b.innerText.startsWith(correctValue + ')') || b.innerText === correctValue) {
                            b.classList.add('bg-green-100', 'text-green-800', 'border-green-300');
                        }
                    });
                }

                allButtons.forEach(b => b.removeAttribute('onclick'));
                updateDashboard();
            };

            return btn;
        }

        window.onload = function() {
            initDashboard();
            loadQuiz();
        };
    </script>
