<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Point | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <header class="p-6 sticky top-0 z-50 glass border-b border-slate-200/60">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter text-blue-600">Education Point</h1>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full p-6 py-12">
        <div id="home" class="animate-in fade-in duration-700">
            <h2 class="text-4xl font-extrabold mb-10">Select your grade.</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-white p-8 rounded-3xl border shadow-sm hover:shadow-xl hover:border-blue-400 transition-all cursor-pointer" onclick="openClass(9)">
                    <i data-lucide="book" class="w-8 h-8 text-blue-500 mb-4"></i>
                    <h3 class="text-2xl font-bold">Grade 9</h3>
                </div>
                <div class="bg-white p-8 rounded-3xl border shadow-sm hover:shadow-xl hover:border-blue-400 transition-all cursor-pointer" onclick="openClass(10)">
                    <i data-lucide="pen-tool" class="w-8 h-8 text-indigo-500 mb-4"></i>
                    <h3 class="text-2xl font-bold">Grade 10</h3>
                </div>
                <div class="bg-white p-8 rounded-3xl border shadow-sm hover:shadow-xl hover:border-emerald-500 transition-all cursor-pointer" onclick="openClass(11)">
                    <i data-lucide="graduation-cap" class="w-8 h-8 text-emerald-500 mb-4"></i>
                    <h3 class="text-2xl font-bold">Grade 11</h3>
                </div>
                <div class="bg-white p-8 rounded-3xl border shadow-sm hover:shadow-xl hover:border-orange-400 transition-all cursor-pointer" onclick="openClass(12)">
                    <i data-lucide="award" class="w-8 h-8 text-orange-500 mb-4"></i>
                    <h3 class="text-2xl font-bold">Grade 12</h3>
                </div>
            </div>
        </div>

        <div id="subject-page" class="hidden animate-in slide-in-from-bottom-8 duration-500">
            <button onclick="goHome()" class="mb-8 flex items-center text-sm font-semibold text-slate-500 hover:text-blue-600">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back
            </button>
            <h2 id="class-title" class="text-4xl font-extrabold mb-10">Subjects</h2>
            <div id="subject-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const subjects = ["Tarjama Tul Quran", "English", "Physics", "Math", "Urdu", "Islamiat", "Computer", "Biology", "Chemistry"];

        function openClass(cls) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('subject-page').classList.remove('hidden');
            document.getElementById('class-title').innerText = "Grade " + cls + " Subjects";
            
            const grid = document.getElementById('subject-grid');
            grid.innerHTML = "";

            subjects.forEach(sub => {
                const fileName = `${cls}th-class-${sub.toLowerCase().replace(/ /g, '-')}-mcqs.html`;

                if (cls === 11) {
                    grid.innerHTML += `
                        <a href="${fileName}" class="p-6 bg-white rounded-2xl border hover:border-blue-500 hover:bg-blue-50 transition-all flex items-center space-x-3 font-semibold text-slate-700 shadow-sm hover:shadow-md">
                            <i data-lucide="file-text" class="w-5 h-5 text-blue-500"></i>
                            <span>${sub}</span>
                        </a>`;
                } else {
                    grid.innerHTML += `
                        <div class="p-6 bg-slate-100 rounded-2xl border border-slate-200 opacity-60 flex items-center space-x-3 font-semibold text-slate-500 cursor-not-allowed">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                            <span>${sub} (Coming Soon)</span>
                        </div>`;
                }
            });
            lucide.createIcons();
        }

        function goHome() {
            document.getElementById('subject-page').classList.add('hidden');
            document.getElementById('home').classList.remove('hidden');
        }
    </script>
</body>
</html>
